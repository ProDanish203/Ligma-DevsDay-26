services:
  postgres:
    image: postgres:16-alpine
    container_name: ligma-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ligma}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ligma}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ligma-network

  redis:
    image: redis:7-alpine
    container_name: ligma-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ligma-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ligma-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ligma}?schema=public

      PORT: ${PORT:-8000}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      BASE_DOMAIN: ${BASE_DOMAIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-3600}
      
      # Redis Configuration
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      
      # Database Migration Control
      RESET_DATABASE: ${RESET_DATABASE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8000', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ligma-network
    command: >
      sh -c "if [ \"$RESET_DATABASE\" = \"true\" ]; then
               echo 'Resetting database...' &&
               pnpm prisma migrate reset --force;
             else
               echo 'Deploying migrations...' &&
               pnpm prisma migrate deploy;
             fi &&
             if [ -f dist/main.js ]; then node dist/main.js;
             elif [ -f dist/src/main.js ]; then node dist/src/main.js;
             else echo 'Error: main.js not found' && ls -la dist/ && exit 1;
             fi"

  adminer:
    image: adminer
    container_name: ligma-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ligma-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ligma-network:
    driver: bridge
