services:
  postgres:
    image: postgres:16-alpine
    container_name: ligma_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: danish
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ligma
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: ligma_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
